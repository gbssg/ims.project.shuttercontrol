<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steuerung</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Rolladen Steuerung</h1>
        <img src="../docs/img/logo.png" alt="IMS-T Logo">
    </header>
    <div>
        <div>
            <h3>Rolladen Preset</h3>
        </div>
        <div class="buttons">
            <button id="preset1">Preset Beide Gekippt</button>
            <button id="preset2">Preset Beide Runter</button>
            <button id="preset3">Preset Beide Hoch</button>
            <button id="preset4">Preset Beide Stop</button>
        </div>
        <div>
            <h3>Rolladen Links</h3>
            <span id="heightDisplay"></span>
        </div>
        <div class="buttons">
            <button id="up_button">Up</button>
            <button id="down_button">Down</button>
            <button id="stop_button">Stop</button>
        </div>
        <div>
            <h3>Rolladen Rechts</h3>
            <span id="heightDisplay2"></span>
        </div>
        <div class="buttons">
            <button id="up_button_2">Up</button>
            <button id="down_button_2">Down</button>
            <button id="stop_button_2">Stop</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
